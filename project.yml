name: Soul
options:
  bundleIdPrefix: com.soul.browser
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CLANG_CXX_LANGUAGE_STANDARD: "c++20"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_ENABLE_OBJC_ARC: YES
    SWIFT_VERSION: "5.0"
    # Clone-friendly signing defaults. Local development uses ad-hoc signing so
    # contributors do not need the original author's Apple developer team.
    # Release distributors can override CODE_SIGN_IDENTITY and DEVELOPMENT_TEAM
    # from Xcode or xcodebuild when they are ready to notarize.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    # Daily driver: ad-hoc signed, hardened runtime off (simplest for V8 +
    # local Secure Enclave / Touch ID passkey testing).
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
    # Release keeps hardened runtime on. Override CODE_SIGN_IDENTITY with a
    # Developer ID Application certificate and DEVELOPMENT_TEAM to notarize.
    Release:
      ENABLE_HARDENED_RUNTIME: YES

targetTemplates:
  CEFHelper:
    type: application
    platform: macOS
    sources:
      - path: Sources/Helper
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Helper-Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/helper.entitlements
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/third_party/cef"
        PRODUCT_NAME: ${product_name}
        PRODUCT_BUNDLE_IDENTIFIER: ${bundle_id}
        OTHER_LDFLAGS:
          - "-lpthread"
          - "$(SRCROOT)/third_party/cef/build/libcef_dll_wrapper/libcef_dll_wrapper.a"
    dependencies:
      - sdk: Cocoa.framework
      - sdk: IOSurface.framework

targets:
  # ---- Helper sub-processes (5 bundles sharing one binary source) ----
  SoulHelper:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Soul Helper"
      bundle_id: "com.soul.browser.helper"

  SoulHelperGPU:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Soul Helper (GPU)"
      bundle_id: "com.soul.browser.helper.gpu"

  SoulHelperPlugin:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Soul Helper (Plugin)"
      bundle_id: "com.soul.browser.helper.plugin"

  SoulHelperRenderer:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Soul Helper (Renderer)"
      bundle_id: "com.soul.browser.helper.renderer"

  SoulHelperAlerts:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Soul Helper (Alerts)"
      bundle_id: "com.soul.browser.helper.alerts"

  # ---- Main browser application ----
  Soul:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Bridge
      - path: Sources/Shared
      - path: Sources/UI
      - path: Sources/Resources/App-Info.plist
        buildPhase: none
      - path: Sources/Resources/home.html
        buildPhase: resources
      - path: Sources/Resources/trackers.txt
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Soul"
        PRODUCT_BUNDLE_IDENTIFIER: "com.soul.browser"
        PRODUCT_MODULE_NAME: "Soul"
        INFOPLIST_FILE: Sources/Resources/App-Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/app.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridge/Soul-Bridging-Header.h
        SWIFT_OBJC_INTERFACE_HEADER_NAME: "Soul-Swift.h"
        SWIFT_INSTALL_OBJC_HEADER: YES
        CLANG_ENABLE_MODULES: YES
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/third_party/cef"
          - "$(SRCROOT)/Sources/App"
          - "$(SRCROOT)/Sources/Bridge"
        OTHER_LDFLAGS:
          - "-lpthread"
          - "$(SRCROOT)/third_party/cef/build/libcef_dll_wrapper/libcef_dll_wrapper.a"
    dependencies:
      - sdk: Cocoa.framework
      - sdk: IOSurface.framework
      - sdk: libsqlite3.tbd
      - target: SoulHelper
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: SoulHelperGPU
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: SoulHelperPlugin
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: SoulHelperRenderer
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: SoulHelperAlerts
        embed: true
        codeSign: true
        copy:
          destination: frameworks
    postBuildScripts:
      - script: bash "$SRCROOT/Scripts/embed_cef_framework.sh"
        name: Embed CEF Framework

  SoulTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Soul

