<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>New Tab</title>
<style>
:root {
  --bg:#0c0c0e; --fg:#f5f5f7; --muted:#8e8e93;
  --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.18);
  --tile:rgba(255,255,255,0.055); --tile-hi:rgba(255,255,255,0.10);
  --shadow:0 4px 20px rgba(0,0,0,0.35); --shadow-hi:0 8px 40px rgba(0,0,0,0.5);
  --accent:#6366f1; --accent2:#8b5cf6; --glow:rgba(99,102,241,0.25);
  --radius:18px; --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#f5f5f7; --fg:#1d1d1f; --muted:#86868b;
    --border:rgba(0,0,0,0.06); --border-hi:rgba(0,0,0,0.15);
    --tile:rgba(255,255,255,0.65); --tile-hi:#fff;
    --shadow:0 4px 20px rgba(0,0,0,0.06); --shadow-hi:0 8px 40px rgba(0,0,0,0.10);
    --glow:rgba(99,102,241,0.12);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--fg);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:72px 24px 40px}
.container{width:100%;max-width:680px;display:flex;flex-direction:column;align-items:center;gap:40px}

/* Clock */
.clock{font-size:72px;font-weight:200;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;opacity:0;animation:fadeUp .8s .1s forwards}
.date{font-size:15px;color:var(--muted);margin-top:4px;opacity:0;animation:fadeUp .8s .2s forwards}
.greeting{font-size:13px;color:var(--muted);margin-top:2px;opacity:0;animation:fadeUp .8s .3s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Search */
.search-wrap{width:100%;max-width:520px;position:relative;z-index:200;opacity:0;animation:fadeUp .8s .35s forwards}
.search{width:100%;height:50px;padding:0 20px 0 46px;border-radius:100px;border:1px solid var(--border);background:var(--tile);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:var(--fg);font-size:15px;font-family:var(--font);outline:none;transition:all .25s ease;box-shadow:var(--shadow)}
.search::placeholder{color:var(--muted);opacity:.6}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow),var(--shadow-hi);background:var(--tile-hi)}
.search-icon{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;opacity:.5}

/* Dropdown */
.drop{position:absolute;top:58px;left:0;right:0;background:var(--tile-hi);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-hi);z-index:1000;max-height:380px;overflow-y:auto;display:none;opacity:0;transform:translateY(-6px);transition:opacity .18s ease,transform .18s ease}
.drop.show{display:block;opacity:1;transform:translateY(0)}
.srow,.hrow,.crow{display:flex;align-items:center;gap:10px;padding:9px 16px;text-decoration:none;color:var(--fg);font-size:13.5px;transition:background .08s;cursor:pointer;border-bottom:1px solid var(--border)}
.srow:hover,.hrow:hover,.crow:hover,.srow.sel,.hrow.sel,.crow.sel{background:var(--tile)}
.srow-icon,.crow-icon{color:var(--accent);opacity:.8;flex-shrink:0;width:18px;text-align:center}
.srow-query,.crow-query{color:var(--muted);font-weight:400}
.srow-hint,.crow-hint{margin-left:auto;font-size:11px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:6px}
.hrow{justify-content:space-between}
.hrow-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px}
.hrow-url{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.hd-divider{padding:5px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:var(--tile)}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;background:var(--border);border-radius:5px;font-size:10px;font-family:ui-monospace,monospace;color:var(--muted);margin-left:auto}

/* Tiles */
.tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;width:100%;position:relative;z-index:10}
@media(max-width:640px){.tiles{grid-template-columns:repeat(4,1fr)}}
@media(max-width:480px){.tiles{grid-template-columns:repeat(3,1fr)}}
.tile{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 8px;border-radius:var(--radius);background:var(--tile);border:1px solid var(--border);text-decoration:none;color:var(--fg);transition:all .25s cubic-bezier(.16,1,.3,1);cursor:pointer;position:relative;box-shadow:var(--shadow);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);opacity:0;animation:fadeUp .6s forwards}
.tile:hover{background:var(--tile-hi);border-color:var(--border-hi);transform:translateY(-3px) scale(1.02);box-shadow:var(--shadow-hi)}
.tile:active{transform:translateY(-1px) scale(.98)}
.tile-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,rgba(128,128,128,.06),rgba(128,128,128,.02))}
.tile-icon{width:24px;height:24px;object-fit:contain}
.tile-name{font-size:11px;font-weight:500;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:var(--muted);padding:0 4px}
.tile-add{border:1.5px dashed var(--border);background:transparent;box-shadow:none;min-height:90px}
.tile-add:hover{border-color:var(--border-hi);background:var(--tile)}
.tile-add .tile-icon-wrap{background:none}
.tile-add svg{width:22px;height:22px;color:var(--muted);opacity:.4}
.tile-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ff453a;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;z-index:2;box-shadow:0 2px 6px rgba(255,69,58,.4)}
body.editing .tile-remove{display:flex}
body.editing .tile-add{display:none}
.edit-btn{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--tile);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:var(--shadow);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.edit-btn:hover{transform:scale(1.08);border-color:var(--border-hi);color:var(--fg)}
.edit-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Bang pills in search */
.bang-pill{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:var(--accent);background:var(--glow);padding:3px 10px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s}
.bang-pill.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div style="text-align:center">
    <div class="clock" id="clk">--:--</div>
    <div class="date" id="dte">--</div>
    <div class="greeting" id="grt">Welcome back</div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <form id="sf" action="https://www.google.com/search" method="get" autocomplete="off" style="width:100%">
      <input class="search" id="si" name="q" type="text" placeholder="Search, type ! for bangs, > for commands..." autofocus>
    </form>
    <span class="bang-pill" id="bp"></span>
    <div class="drop" id="drop"></div>
  </div>

  <div class="tiles" id="tiles"></div>
</div>

<button class="edit-btn" id="eb" title="Edit shortcuts">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
</button>

<script>
// ── Clock ──
function pad(n){return String(n).padStart(2,'0')}
function updClk(){const n=new Date();document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes());document.getElementById('dte').textContent=n.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});}
function updGrt(){const h=new Date().getHours();document.getElementById('grt').textContent=h<12?'Good morning':h<17?'Good afternoon':'Good evening';}
updClk();updGrt();setInterval(updClk,15e3);setInterval(updGrt,6e4);

// ── Bang engines ──
const BANGS={
  '!g':{name:'Google',url:'https://www.google.com/search?q={q}'},
  '!d':{name:'DuckDuckGo',url:'https://duckduckgo.com/?q={q}'},
  '!b':{name:'Bing',url:'https://www.bing.com/search?q={q}'},
  '!yt':{name:'YouTube',url:'https://www.youtube.com/results?search_query={q}'},
  '!w':{name:'Wikipedia',url:'https://en.wikipedia.org/wiki/Special:Search?search={q}'},
  '!gh':{name:'GitHub',url:'https://github.com/search?q={q}&type=repositories'},
  '!r':{name:'Reddit',url:'https://www.reddit.com/search/?q={q}'},
  '!a':{name:'Amazon',url:'https://www.amazon.com/s?k={q}'},
  '!m':{name:'Maps',url:'https://www.google.com/maps/search/{q}'},
  '!t':{name:'Translate',url:'https://translate.google.com/?sl=auto&tl=en&text={q}'},
  '!so':{name:'Stack Overflow',url:'https://stackoverflow.com/search?q={q}'},
  '!npm':{name:'npm',url:'https://www.npmjs.com/search?q={q}'},
  '!mdn':{name:'MDN',url:'https://developer.mozilla.org/en-US/search?q={q}'},
  '!tw':{name:'Twitter/X',url:'https://x.com/search?q={q}'},
  '!sp':{name:'Spotify',url:'https://open.spotify.com/search/{q}'},
  '!imdb':{name:'IMDb',url:'https://www.imdb.com/find?q={q}'},
};
const BANG_KEYS=Object.keys(BANGS);

// ── Commands ──
const COMMANDS={
  '>settings':{label:'Open Settings',action:()=>window.location.href='soul://newtab/?settings=1'},
  '>downloads':{label:'Open Downloads',action:()=>window.location.href='soul://newtab/?downloads=1'},
  '>history':{label:'Open History',action:()=>window.location.href='soul://newtab/?history=1'},
  '>bookmarks':{label:'Open Bookmarks',action:()=>window.location.href='soul://newtab/?bookmarks=1'},
  '>clear':{label:'Clear favorites',action:()=>{localStorage.removeItem(KEY);load();}},
  '>focus':{label:'Focus mode (zen)',action:()=>document.body.classList.toggle('zen')},
};

// ── Tiles ──
const KEY='soul_ntp_v3';
const DEF=[
  {n:'GitHub',u:'https://github.com'},{n:'Reddit',u:'https://reddit.com'},{n:'YouTube',u:'https://youtube.com'},
  {n:'Gmail',u:'https://gmail.com'},{n:'Wikipedia',u:'https://wikipedia.org'},{n:'X',u:'https://x.com'},
  {n:'Discord',u:'https://discord.com'},{n:'HN',u:'https://news.ycombinator.com'},{n:'Vercel',u:'https://vercel.com'},{n:'Figma',u:'https://figma.com'}
];
let tiles=[],editing=false;

function fav(u){try{return'https://www.google.com/s2/favicons?domain='+new URL(u).hostname+'&sz=64';}catch(e){return'';}}
function load(){try{tiles=JSON.parse(localStorage.getItem(KEY))||[];}catch(e){tiles=[];}if(!tiles.length){tiles=[...DEF];save();}render();}
function save(){localStorage.setItem(KEY,JSON.stringify(tiles));}
function rm(i){tiles.splice(i,1);save();render();}
function add(){const url=prompt('URL:');if(!url)return;let name=prompt('Name (optional):');if(!name){try{name=new URL(url).hostname.replace(/^www\./,'');}catch(e){name=url;}}let f=url;if(!/^https?:\/\//i.test(f))f='https://'+f;tiles.push({n:name.trim(),u:f.trim()});save();render();}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  const el=document.getElementById('tiles');
  el.innerHTML=tiles.map((t,i)=>`
    <a href="${esc(t.u)}" class="tile" draggable="${editing}" data-i="${i}" style="animation-delay:${i*40}ms"
       ondragstart="ds(event)" ondragover="do_(event)" ondragenter="de(event)" ondragleave="dl(event)" ondrop="dp(event)" ondragend="dend(event)">
      <button class="tile-remove" onclick="event.preventDefault();rm(${i})">&times;</button>
      <div class="tile-icon-wrap"><img class="tile-icon" src="${fav(t.u)}" alt="" onerror="this.style.display='none'" loading="lazy"></div>
      <span class="tile-name">${esc(t.n)}</span>
    </a>
  `).join('')+`
    <button class="tile tile-add" style="animation-delay:${tiles.length*40}ms" onclick="add()">
      <div class="tile-icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>
      <span class="tile-name">Add</span>
    </button>
  `;
}

let srcEl=null;
function ds(e){if(!editing)return;srcEl=e.currentTarget;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('t',e.currentTarget.dataset.i);e.currentTarget.style.opacity='0.4';}
function do_(e){e.preventDefault();e.dataTransfer.dropEffect='move';return false;}
function de(e){if(!editing)return;e.currentTarget.style.borderColor='var(--accent)';}
function dl(e){e.currentTarget.style.borderColor='';}
function dp(e){e.stopPropagation();const si=parseInt(e.dataTransfer.getData('t'),10);const ti=parseInt(e.currentTarget.dataset.i,10);if(si!==ti){const x=tiles[si];tiles.splice(si,1);tiles.splice(ti,0,x);save();render();}return false;}
function dend(e){e.currentTarget.style.opacity='1';document.querySelectorAll('.tile').forEach(t=>t.style.borderColor='');}

document.getElementById('eb').addEventListener('click',function(){editing=!editing;document.body.classList.toggle('editing',editing);this.classList.toggle('active',editing);render();});

// ── Search engine ──
const si=document.getElementById('si');
const drop=document.getElementById('drop');
const bp=document.getElementById('bp');
let db,selIdx=-1,rows=[];

function parseBang(q){
  const m=q.match(/^(!\S+)\s*(.*)$/);
  if(!m)return null;
  const bang=m[1].toLowerCase(),rest=m[2];
  const eng=BANGS[bang];
  if(!eng)return null;
  return{eng,bang,rest};
}

function buildRows(q){
  const out=[];
  // 1. Bang suggestions
  const b=parseBang(q);
  if(b){
    bp.textContent=b.eng.name;bp.classList.add('show');
    const url=b.eng.url.replace('{q}',encodeURIComponent(b.rest));
    out.push({type:'s',html:`<div class="srow sel"><span class="srow-icon">!</span><span class="srow-text">Search <b>${esc(b.eng.name)}</b> for <span class="srow-query">${esc(b.rest||'(empty)')}</span></span><span class="srow-hint">${esc(b.bang)}</span></div>`,href:url});
  }else if(q.startsWith('!')){
    bp.classList.remove('show');
    const hits=BANG_KEYS.filter(k=>k.startsWith(q.toLowerCase().split(' ')[0])).slice(0,5);
    hits.forEach(k=>{const e=BANGS[k];out.push({type:'s',html:`<div class="srow sel"><span class="srow-icon">!</span><span class="srow-text">${esc(e.name)}</span><span class="srow-hint">${esc(k)}</span></div>`,href:null});});
  }else{bp.classList.remove('show');}

  // 2. Commands
  if(q.startsWith('>')){
    Object.entries(COMMANDS).forEach(([cmd,info])=>{
      if(cmd.includes(q.toLowerCase())) out.push({type:'c',html:`<div class="crow sel"><span class="crow-icon">⌘</span><span class="crow-text">${esc(info.label)}</span><span class="crow-hint">${esc(cmd)}</span></div>`,action:info.action});
    });
  }

  // 3. Direct nav
  if(q.includes('.')&&!q.includes(' ')){
    const url=(q.startsWith('http')?'':'https://')+q;
    out.push({type:'s',html:`<div class="srow sel"><span class="srow-icon">↗</span><span class="srow-text">Go to <span class="srow-query">${esc(url)}</span></span><span class="srow-hint">Direct</span></div>`,href:url});
  }

  // 4. Google search fallback
  if(!q.startsWith('!')&&!q.startsWith('>')){
    out.push({type:'s',html:`<div class="srow sel"><span class="srow-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span><span class="srow-text">Search <span class="srow-query">${esc(q)}</span></span><span class="srow-hint">Google</span></div>`,href:'https://www.google.com/search?q='+encodeURIComponent(q)});
  }
  return out;
}

function show(q,extras){
  rows=buildRows(q);
  if(extras&&extras.length){
    rows.push({type:'d',html:`<div class="hd-divider">History</div>`,href:null});
    extras.forEach(x=>rows.push({type:'h',html:`<a href="${esc(x.u||x.url)}" class="hrow sel"><span class="hrow-title">${esc(x.t||x.title||x.u||x.url)}</span><span class="hrow-url">${esc((x.u||x.url).replace(/^https?:\/\//,''))}</span></a>`,href:x.u||x.url}));
  }
  if(!rows.length){drop.classList.remove('show');return;}
  drop.innerHTML=rows.map(r=>r.html).join('');
  selIdx=0;highlight();drop.classList.add('show');
}

function highlight(){
  const all=drop.querySelectorAll('.srow, .crow, .hrow');
  all.forEach((el,i)=>el.classList.toggle('sel',i===selIdx));
}

function exec(row){
  if(!row)return;
  if(row.action){row.action();return;}
  if(row.href){window.location.href=row.href;return;}
}

si.addEventListener('input',function(e){
  clearTimeout(db);
  const q=si.value.trim();
  if(!q){drop.classList.remove('show');bp.classList.remove('show');selIdx=-1;return;}
  // Instant local rows
  const local=buildRows(q);
  if(local.length){show(q);}
  // Fetch history after
  db=setTimeout(()=>{
    fetch('soul://api/history?q='+encodeURIComponent(q))
      .then(r=>r.json())
      .then(d=>{if(d.length)show(q,d);})
      .catch(()=>{});
  },60);
});

// Focus = show recent history
si.addEventListener('focus',function(){
  if(si.value.trim())return;
  fetch('soul://api/history?q=').then(r=>r.json()).then(d=>{
    if(!d.length)return;
    const q=si.value.trim();
    show(q||'',d.slice(0,6));
  }).catch(()=>{});
});

// Keyboard nav
si.addEventListener('keydown',function(e){
  const items=drop.querySelectorAll('.srow, .crow, .hrow');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,items.length-1);highlight();}
  else if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);highlight();}
  else if(e.key==='Enter'){e.preventDefault();const r=rows.filter(x=>x.type!=='d')[selIdx];if(r)exec(r);else{document.getElementById('sf').submit();}}
  else if(e.key==='Escape'){drop.classList.remove('show');si.blur();}
});

// Click outside to close
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))drop.classList.remove('show');});

// Global / focus search
document.addEventListener('keydown',function(e){if(e.key==='/'&&document.activeElement!==si){e.preventDefault();si.focus();}});

// Submit
document.getElementById('sf').addEventListener('submit',function(e){
  const v=si.value.trim();
  const b=parseBang(v);
  if(b){e.preventDefault();window.location.href=b.eng.url.replace('{q}',encodeURIComponent(b.rest));return;}
  if(v.includes('.')&&!v.includes(' ')){e.preventDefault();window.location.href=(v.startsWith('http')?'':'https://')+v;return;}
});

load();
</script>
</body>
</html>
